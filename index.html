<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deldebbio.cc</title>
<link rel="icon" href="/favicon.png">

<style>
body {
  max-width: 700px;
  margin: 40px auto;
  padding: 0 10px;
  font-family: Arial, sans-serif;
}

img {
  width: 100%;
  border-radius: 8px;
  display: block;
}

.item {
  margin-bottom: 40px;
}

.titulo {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<button onclick="exportar()">EXPORTAR</button>

<div class="item">
  <img src="titulomaior.jpg">
</div>

<div class="item">
  <img src="madonna.jpg">
  <div class="titulo">Madonna Del Debbio ☹ 11-05-2023</div>
</div>

<div class="item">
  <img src="bartolomeu.jpg">
  <div class="titulo">Bartolomeu Del Debbio ☹ 10-01-2026</div>
</div>

<div class="item">
  <img src="bobby.jpg">
  <div class="titulo">Bobby Del Debbio</div>
</div>

<script>
function exportar() {
  navigator.clipboard.writeText(document.documentElement.outerHTML);
  alert("HTML copiado!");
}
</script>

</body>
</html>
