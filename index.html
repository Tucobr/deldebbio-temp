<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>deldebbio.cc</title>

  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      line-height: 1.6;
      padding: 0 10px;
    }

    .item {
      margin-bottom: 50px;
    }

    img {
      width: 100%;

    }

    p {

  }
          {
    margin-top: 12px;
    font-size: 16px;
    color: #333;
    text-align: center;
    max-width: 90%;
    margin-left: auto;
    margin-right: auto;
    font-family: Georgia, "Times New Roman", serif;
    }

    .toolbar {
      position: fixed;
      top: 10px;
      right: 10px;
      background: black;
      color: white;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="toolbar" onclick="exportar()">EXPORTAR</div>

<!-- IMAGEM DO TÍTULO -->
<div class="item">
  <img src="index_arquivos/titulomaior.jpg">
</div>

<!-- MADONNA -->
<div class="item">
  <img src="index_arquivos/madonna.jpg">
  <p contenteditable="true">
  Madonna Del Debbio  11-05-2023
    Saudades Eternas!
  </p>
</div>

<!-- BARTOLOMEU -->
<div class="item">
  <img src="index_arquivos/bartolomeu.jpg">

   Bartolomeu Del Debbio 10-01-2026
    Nossa gratidão pelo teu carinho!
  </p>
</div>

<!-- BOBBY -->

    É o nosso bom companheiro!
  </p>
</div>

<script>
function exportar() {
  const html = document.documentElement.outerHTML;
  navigator.clipboard.writeText(html);
  alert("HTML copiado! Cole no GitHub.");
}
</script>

</body>
</html>
